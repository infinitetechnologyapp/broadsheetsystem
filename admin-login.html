<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Recomella Academy</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">RA</div>
    <h2 class="login-title">Recomella Academy</h2>
    <p class="login-sub">Result Broadsheet — Admin Portal</p>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="adminEmail" class="form-control" placeholder="your@gmail.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="toggle-pw" id="togglePw">
          <i class="bi bi-eye-slash"></i>
        </button>
      </div>
    </div>

    <div id="loginError" class="alert alert-error mb-2 hidden">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="loginErrorMsg">Invalid credentials.</span>
    </div>

    <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:4px">
      <i class="bi bi-box-arrow-in-right"></i> Sign In
    </button>

    <div style="text-align:center;margin-top:20px">
      <a href="index.html" style="font-size:.82rem;color:var(--text-muted);font-weight:600">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>
    </div>

  </div>
</div>


<script type="module" src="admin-login.js"></script>
</body>
</html>
